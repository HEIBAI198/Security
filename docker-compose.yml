services:
  mongo:
    image: docker.m.daocloud.io/library/mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      SYSML_STORAGE: mongodb
      SYSML_MONGO_STRICT: "true"
      MONGO_URL: mongodb://mongo:27017
      SUPPLYGUARD_FRONTEND_DIST: /app/frontend/dist
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
    ports:
      - "8000:8000"
    volumes:
      - ./storage/graph_models:/app/storage/graph_models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo-data:
