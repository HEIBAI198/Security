id: multimodal-secret-exposure-text
title: ASR/OCR 文本中出现密钥或令牌暴露信号
status: experimental
description: 截图或转写文本中出现 token、secret、password、密钥等敏感凭据关键词。
references:
  - https://sigmahq.io/sigma-specification/
  - https://github.com/SigmaHQ/sigma
tags:
  - attack.credential_access
