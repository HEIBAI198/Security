rules:
  - id: supplyguard.python.sql-string-concat
    languages: [python]
    severity: ERROR
    message: SQL query uses string concatenation and may introduce SQL injection.
    metadata:
      category: sql_injection
      cwe: CWE-89
      recommendation: Use parameterized queries and whitelist dynamic identifiers.
    patterns:
      - pattern-either:
          - pattern: $CURSOR.execute($SQL + $VALUE, ...)
          - pattern: $DB.execute($SQL + $VALUE, ...)
          - pattern: $SESSION.execute($SQL + $VALUE, ...)
          - pattern: $CONN.execute($SQL + $VALUE, ...)
      - metavariable-regex:
          metavariable: $SQL
          regex: (?is).*(select|insert|update|delete|where|from|order\s+by).*

  - id: supplyguard.python.sql-f-string
    languages: [python]
    severity: ERROR
    message: SQL query uses f-string interpolation and may introduce SQL injection.
    metadata:
      category: sql_injection
      cwe: CWE-89
      recommendation: Use parameterized queries and whitelist dynamic identifiers.
    pattern-either:
      - pattern: $CURSOR.execute(f"...", ...)
      - pattern: $DB.execute(f"...", ...)
      - pattern: $SESSION.execute(f"...", ...)
      - pattern: $CONN.execute(f"...", ...)

  - id: supplyguard.javascript.sql-template-expression
    languages: [javascript, typescript]
    severity: ERROR
    message: SQL query uses template interpolation and may introduce SQL injection.
    metadata:
      category: sql_injection
      cwe: CWE-89
      recommendation: Use database driver parameter binding instead of interpolated SQL.
    pattern-either:
      - pattern: $DB.query(`...${$VALUE}...`, ...)
      - pattern: $DB.execute(`...${$VALUE}...`, ...)
      - pattern: $CLIENT.query(`...${$VALUE}...`, ...)
      - pattern: $POOL.query(`...${$VALUE}...`, ...)

  - id: supplyguard.python.os-system
    languages: [python]
    severity: ERROR
    message: os.system executes a shell command and may introduce command injection.
    metadata:
      category: command_injection
      cwe: CWE-78
      recommendation: Avoid shell commands; use argument arrays and strict allowlists.
    pattern-either:
      - pattern: os.system(...)
      - pattern: $OS.system(...)

  - id: supplyguard.python.subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: subprocess uses shell=True and may introduce command injection.
    metadata:
      category: command_injection
      cwe: CWE-78
      recommendation: Disable shell=True and use argument arrays with strict validation.
    pattern-either:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)

  - id: supplyguard.javascript.child-process-exec
    languages: [javascript, typescript]
    severity: ERROR
    message: child_process.exec executes a shell command and may introduce command injection.
    metadata:
      category: command_injection
      cwe: CWE-78
      recommendation: Use execFile/spawn with argument arrays and validate inputs.
    pattern-either:
      - pattern: child_process.exec(...)
      - pattern: require("child_process").exec(...)
      - pattern: exec(...)

  - id: supplyguard.javascript.child-process-spawn-shell
    languages: [javascript, typescript]
    severity: ERROR
    message: child_process enables shell mode and may introduce command injection.
    metadata:
      category: command_injection
      cwe: CWE-78
      recommendation: Avoid shell mode; if required, enforce strict command and argument allowlists.
    pattern-either:
      - pattern: 'child_process.spawn($CMD, $ARGS, {shell: true, ...})'
      - pattern: 'child_process.execFile($CMD, $ARGS, {shell: true, ...})'
      - pattern: 'spawn($CMD, $ARGS, {shell: true, ...})'
      - pattern: 'execFile($CMD, $ARGS, {shell: true, ...})'

  - id: supplyguard.python.pickle-load
    languages: [python]
    severity: ERROR
    message: pickle deserialization of untrusted data may lead to code execution.
    metadata:
      category: unsafe_deserialization
      cwe: CWE-502
      recommendation: Do not deserialize untrusted pickle data; use safe formats and validation.
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: supplyguard.python.yaml-load
    languages: [python]
    severity: WARNING
    message: yaml.load without SafeLoader may deserialize unsafe objects.
    metadata:
      category: unsafe_deserialization
      cwe: CWE-502
      recommendation: Use yaml.safe_load or an explicit SafeLoader.
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=SafeLoader, ...)

  - id: supplyguard.javascript.deserialize
    languages: [javascript, typescript]
    severity: ERROR
    message: deserialize/unserialize of untrusted input may be unsafe.
    metadata:
      category: unsafe_deserialization
      cwe: CWE-502
      recommendation: Avoid unsafe deserialization; use JSON.parse with schema validation.
    pattern-either:
      - pattern: serialize.unserialize(...)
      - pattern: serialize.deserialize(...)
      - pattern: unserialize(...)
      - pattern: deserialize(...)

  - id: supplyguard.react.dangerously-set-inner-html
    languages: [javascript, typescript]
    severity: ERROR
    message: React dangerouslySetInnerHTML may introduce XSS.
    metadata:
      category: xss
      cwe: CWE-79
      recommendation: Avoid dangerouslySetInnerHTML or sanitize trusted HTML before rendering.
    pattern: <$TAG dangerouslySetInnerHTML={...} />

  - id: supplyguard.javascript.dom-inner-html
    languages: [javascript, typescript]
    severity: WARNING
    message: innerHTML/outerHTML assignment may introduce XSS.
    metadata:
      category: xss
      cwe: CWE-79
      recommendation: Use textContent or framework escaping instead of unsafe HTML sinks.
    pattern-either:
      - pattern: $EL.innerHTML = $VALUE
      - pattern: $EL.outerHTML = $VALUE
      - pattern: $EL.insertAdjacentHTML(...)

  - id: supplyguard.javascript.document-write
    languages: [javascript, typescript]
    severity: WARNING
    message: document.write may introduce XSS.
    metadata:
      category: xss
      cwe: CWE-79
      recommendation: Avoid document.write and sanitize any HTML input.
    pattern-either:
      - pattern: document.write(...)
      - pattern: document.writeln(...)
