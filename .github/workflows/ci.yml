name: SupplyGuard CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi python-multipart uvicorn pydantic httpx PyYAML || true

      - name: Compile backend
        run: |
          python -B -m py_compile server.py supplyguard/app.py supplyguard/artifact_trust.py supplyguard/routes/security.py supplyguard/knowledge_graph.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npx vite build

  docker:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --pull -t supplyguard-kg:ci . || true
