name: SupplyGuard Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build artifact
        run: |
          mkdir -p storage/samples/artifacts
          tar -czf storage/samples/artifacts/checkout-api.tar.gz supplyguard frontend/dist pyproject.toml requirements.txt

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: storage/samples/artifacts/checkout-api.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkout-api
          path: storage/samples/artifacts/checkout-api.tar.gz
